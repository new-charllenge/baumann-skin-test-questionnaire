<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSTI 官方臨床 64 題專業膚質檢測</title>
    <style>
        :root { --primary: #00796b; --bg: #f4f7f7; --text: #333; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 500px; min-height: 100vh; padding: 20px; box-sizing: border-box; box-shadow: 0 0 20px rgba(0,0,0,0.05); position: relative; }
        .header { position: sticky; top: 0; background: white; padding: 10px 0; border-bottom: 2px solid #eee; z-index: 100; }
        .progress-text { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--primary); font-weight: bold; margin-bottom: 8px; }
        .bar-bg { width: 100%; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }
        .q-container { margin-top: 20px; padding-bottom: 100px; }
        .step-tag { font-size: 0.75rem; background: #e0f2f1; color: var(--primary); padding: 4px 10px; border-radius: 4px; display: inline-block; margin-bottom: 10px; font-weight: bold; }
        h2 { font-size: 1.15rem; color: #222; line-height: 1.5; margin: 10px 0 20px 0; }
        .option { display: block; width: 100%; margin-bottom: 12px; padding: 16px; border: 1px solid #eee; border-radius: 12px; cursor: pointer; text-align: left; font-size: 0.95rem; background: #fff; transition: 0.2s; box-sizing: border-box; }
        .option:active { background: #e0f2f1; border-color: var(--primary); }
        .hidden { display: none !important; }
        .result-code { font-size: 4rem; font-weight: 900; color: var(--primary); text-align: center; letter-spacing: 5px; margin: 20px 0; }
        .analysis { background: #f9f9f9; padding: 20px; border-radius: 15px; font-size: 0.95rem; line-height: 1.8; border-top: 5px solid var(--primary); }
        .btn-retry { width: 100%; padding: 18px; border: none; background: var(--primary); color: white; border-radius: 12px; font-size: 1.1rem; font-weight: bold; margin-top: 30px; cursor: pointer; }
    </style>
</head>
<body>

<div id="quiz-screen" class="card">
    <div class="header">
        <div class="progress-text">
            <span id="cat-label">準備開始</span>
            <span id="current-total">0 / 64</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" id="bar"></div></div>
    </div>
    <div class="q-container">
        <div class="step-tag" id="step-tag">BSTI 臨床量表</div>
        <h2 id="q-text">載入題目中...</h2>
        <div id="options-box"></div>
    </div>
</div>

<div id="result-screen" class="card hidden">
    <div style="text-align:center; padding-top: 40px;">
        <p style="color:#666;">您的 16 型膚質臨床代碼</p>
        <div class="result-code" id="final-code">----</div>
    </div>
    <div class="analysis" id="result-detail"></div>
    <button class="btn-retry" onclick="location.reload()">重新檢測</button>
</div>

<script>
const questions = [
    // STEP 1: OD (1-11)
    { c:"OD", l:"Step 1: 油性 vs 乾性", q:"1. 洗臉後不抹保濕產品，2小時後觀察臉部：", o:[{t:"A. 粗糙、脫屑或灰暗",v:1},{t:"B. 緊繃感",v:2},{t:"C. 舒適且無油光",v:3},{t:"D. 有油光",v:4}]},
    { c:"OD", l:"Step 1: 油性 vs 乾性", q:"2. 化妝後，你的妝容通常：", o:[{t:"A. 脫皮、起屑",v:1},{t:"B. 正常",v:2},{t:"C. 有光澤",v:3},{t:"D. 變油膩、脫妝",v:4},{t:"E. 我不化妝",v:2.5}]},
    { c:"OD", l:"Step 1: 油性 vs 乾性", q:"3. 感到皮膚乾燥、緊繃的頻率：", o:[{t:"A. 總是",v:1},{t:"B. 經常",v:2},{t:"C. 偶爾",v:3},{t:"D. 從不",v:4}]},
    { c:"OD", l:"Step 1: 油性 vs 乾性", q:"4. 你的毛孔大小？", o:[{t:"A. 幾乎看不見",v:1},{t:"B. 稍微可見",v:2},{t:"C. 明顯",v:3},{t:"D. 粗大",v:4}]},
    { c:"OD", l:"Step 1: 油性 vs 乾性", q:"5. 你的家族成員（父母）皮膚偏向：", o:[{t:"A. 乾性",v:1},{t:"B. 中性",v:2},{t:"C. 混合性",v:3},{t:"D. 油性",v:4}]},
    { c:"OD", l:"Step 1: 油性 vs 乾性", q:"6. 早上起床時臉部的感覺？", o:[{t:"A. 乾、甚至起屑",v:1},{t:"B. 稍微緊繃",v:2},{t:"C. 舒適不油",v:3},{t:"D. 明顯油光",v:4}]},
    { c:"OD", l:"Step 1: 油性 vs 乾性", q:"7. 使用一般乳霜後你的皮膚：", o:[{t:"A. 迅速吸收",v:1},{t:"B. 感到滋潤",v:2},{t:"C. 覺得有點油",v:3},{t:"D. 完全不吸收且悶厚",v:4}]},
    { c:"OD", l:"Step 1: 油性 vs 乾性", q:"8. 你是否經常有黑頭粉刺？", o:[{t:"A. 從不",v:1},{t:"B. 很少",v:2},{t:"C. 偶爾",v:3},{t:"D. 總是",v:4}]},
    { c:"OD", l:"Step 1: 油性 vs 乾性", q:"9. 在 T 字部位（額頭鼻子）的出油狀況？", o:[{t:"A. 乾燥",v:1},{t:"B. 正常",v:2},{t:"C. 有點油",v:3},{t:"D. 非常油",v:4}]},
    { c:"OD", l:"Step 1: 油性 vs 乾性", q:"10. 清潔後如果不塗乳液，15分鐘後：", o:[{t:"A. 全臉緊繃",v:1},{t:"B. 局部緊繃",v:2},{t:"C. 剛剛好",v:3},{t:"D. 已經開始分泌油脂",v:4}]},
    { c:"OD", l:"Step 1: 油性 vs 乾性", q:"11. 你認爲自己的膚質是？", o:[{t:"A. 極乾性",v:1},{t:"B. 乾性",v:2},{t:"C. 中性",v:3},{t:"D. 油性",v:4}]},

    // STEP 2: SR (12-34) 敏感
    { c:"SR", l:"Step 2: 敏感 vs 耐受", q:"12. 臉部出現紅腫塊或紅疹的頻率？", o:[{t:"A. 從不",v:1},{t:"B. 很少",v:2},{t:"C. 至少每月一次",v:3},{t:"D. 每週都有",v:4}]},
    { c:"SR", l:"Step 2: 敏感 vs 耐受", q:"13. 護膚品引起發癢、泛紅或刺痛的頻率？", o:[{t:"A. 從不",v:1},{t:"B. 很少",v:2},{t:"C. 經常",v:3},{t:"D. 總是",v:4}]},
    { c:"SR", l:"Step 2: 敏感 vs 耐受", q:"14. 曾被診斷過酒糟鼻（Rosacea）嗎？", o:[{t:"A. 沒有",v:1},{t:"B. 疑似",v:3},{t:"C. 是，確診",v:4}]},
    { c:"SR", l:"Step 2: 敏感 vs 耐受", q:"15. 佩戴平價珠寶或首飾會發癢嗎？", o:[{t:"A. 從不",v:1},{t:"B. 偶爾",v:2},{t:"C. 經常",v:3},{t:"D. 總是",v:4}]},
    { c:"SR", l:"Step 2: 敏感 vs 耐受", q:"16. 運動或緊張後臉部變紅的程度？", o:[{t:"A. 無感",v:1},{t:"B. 輕微",v:2},{t:"C. 明顯",v:3},{t:"D. 嚴重發燙",v:4}]},
    // ... 此處省略部分重複邏輯題目以節省空間，請按此格式補完至 34 題
    { c:"SR", l:"Step 2: 敏感 vs 耐受", q:"34. 臉部皮膚的整體耐受度感覺？", o:[{t:"A. 很強韌",v:1},{t:"B. 一般",v:2},{t:"C. 偏弱",v:3},{t:"D. 極度脆弱",v:4}]},

    // STEP 3: PN (35-48) 色素
    { c:"PN", l:"Step 3: 色素 vs 非色素", q:"35. 痘痘或受傷後的深色痕跡：", o:[{t:"A. 沒有/不留痕",v:1},{t:"B. 淺褐色",v:2},{t:"C. 深褐色",v:3},{t:"D. 黑色",v:4},{t:"E. 我不長痘",v:2.5}]},
    { c:"PN", l:"Step 3: 色素 vs 非色素", q:"36. 臉上有多少明顯斑點（曬斑、雀斑）？", o:[{t:"A. 0個",v:1},{t:"B. 1-5個",v:2},{t:"C. 6-15個",v:3},{t:"D. 16個以上",v:4}]},
    { c:"PN", l:"Step 3: 色素 vs 非色素", q:"37. 曬太陽後斑點的變化？", o:[{t:"A. 不曬太陽",v:1},{t:"B. 沒變化",v:2},{t:"C. 稍微變深",v:3},{t:"D. 明顯變深",v:4}]},
    { c:"PN", l:"Step 3: 色素 vs 非色素", q:"38. 你的種族/祖籍背景（影響黑色素基底）：", o:[{t:"A. 極白皙",v:1},{t:"B. 一般亞洲膚色",v:2},{t:"C. 容易曬黑",v:3},{t:"D. 深膚色",v:4}]},
    // ... 此處補完至 48 題

    // STEP 4: WT (49-64) 皺紋
    { c:"WT", l:"Step 4: 皺紋 vs 緊緻", q:"49. 你的實際年齡：", o:[{t:"A. 25歲以下",v:1},{t:"B. 26-35歲",v:2},{t:"C. 36-50歲",v:3},{t:"D. 50歲以上",v:4}]},
    { c:"WT", l:"Step 4: 皺紋 vs 緊緻", q:"50. 每年的日曬總時數：", o:[{t:"A. 很少(室內)",v:1},{t:"B. 一般",v:2},{t:"C. 較多",v:3},{t:"D. 極多(戶外愛好者)",v:4}]},
    { c:"WT", l:"Step 4: 皺紋 vs 緊緻", q:"51. 你是否吸菸（包含二手菸）？", o:[{t:"A. 從不",v:1},{t:"B. 很少",v:2},{t:"C. 經常",v:3},{t:"D. 每天",v:4}]},
    // ... 此處補完至 64 題
];
let cur = 0;
let scores = { "OD":0, "SR":0, "PN":0, "WT":0 };
let counts = { "OD":0, "SR":0, "PN":0, "WT":0 };

function render() {
    if (cur >= questions.length) return showResult();
    const q = questions[cur];
    
    // 1. 更新進度條與上方文字
    document.getElementById('bar').style.width = ((cur + 1) / questions.length) * 100 + "%";
    document.getElementById('current-total').innerText = `${cur + 1} / ${questions.length}`;
    document.getElementById('cat-label').innerText = q.l;
    
    // 2. 自動加上題目編號 (cur + 1)
    document.getElementById('q-text').innerText = `${cur + 1}. ${q.q}`;
    
    const box = document.getElementById('options-box');
    box.innerHTML = "";
    
    // 3. 生成選項
    q.o.forEach(opt => {
        const b = document.createElement('div');
        b.className = "option";
        b.innerText = opt.t;
        b.onclick = () => {
            // 計分邏輯
            scores[q.c] += opt.v;
            counts[q.c]++;
            cur++;
            
            // 渲染下一題
            render();
            
            // 自動捲回頂部，讓使用者看新題目
            window.scrollTo({top: 0, behavior: 'smooth'});
        };
        box.appendChild(b);
    });
}

function showResult() {
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    window.scrollTo(0, 0);

    // 臨床閾值判定：平均分 > 2.5 則判定為該維度的前者字母
    const getC = (cat, char1, char2) => (scores[cat] / counts[cat] > 2.5) ? char1 : char2;
    
    const final = [
        getC("OD", "O", "D"), 
        getC("SR", "S", "R"), 
        getC("PN", "P", "N"), 
        getC("WT", "W", "T")
    ].join('');
    
    document.getElementById('final-code').innerText = final;

    const mapping = {
        "O": "<strong>油性 (Oily)</strong>：皮脂腺活躍，需注意深層清潔與水油平衡。",
        "D": "<strong>乾性 (Dry)</strong>：皮脂分泌不足，屏障功能較弱，需加強鎖水。",
        "S": "<strong>敏感 (Sensitive)</strong>：皮膚易受刺激發炎，建議使用溫和修復產品。",
        "R": "<strong>耐受 (Resistant)</strong>：屏障強韌，對環境適應力高，適合高效能保養。",
        "P": "<strong>色素 (Pigmented)</strong>：黑色素細胞活躍，易產生色斑，需嚴格防曬。",
        "N": "<strong>非色素 (Non-Pigmented)</strong>：膚色較均勻，保養重點在於維持透明感。",
        "W": "<strong>皺紋 (Wrinkled)</strong>：皮膚結構易流失彈性，需積極抗氧化與促生膠原。",
        "T": "<strong>緊緻 (Tight)</strong>：肌膚彈性維持良好，建議以預防性保養為主。"
    };

    let resultHtml = "<h3>BSTI 深度診斷報告：</h3><ul style='list-style: none; padding: 0;'>";
    final.split('').forEach(char => {
        resultHtml += `<li style='margin-bottom: 15px; padding: 10px; background: #fff; border-radius: 8px;'>${mapping[char]}</li>`;
    });
    resultHtml += "</ul><p style='color: #666; font-size: 0.9rem;'>* 此結果基於 64 題鮑曼臨床量表計算得出，僅供護膚參考。</p>";
    
    document.getElementById('result-detail').innerHTML = resultHtml;
}

// 啟動測驗
render();
</script>
</body>
</html>
